name: vental_go
description: Кроссплатформенный суперапп — такси, еда, посылки.
publish_to: 'none'
version: 0.1.0

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  provider: ^6.1.2
  dio: ^5.4.0
  cached_network_image: ^3.3.1
  maplibre_gl: ^0.26.2
  url_launcher: ^6.2.5
  shimmer: ^3.0.0
  geolocator: ^12.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/services/
    - assets/images/icons/
    - assets/images/banners/
    - assets/images/cars/
    - assets/map/

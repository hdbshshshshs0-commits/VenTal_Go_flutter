name: vental_go
description: Кроссплатформенный суперапп — такси, еда, посылки.
publish_to: 'none'
version: 0.1.0

environment:
  sdk: '>=3.7.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  provider: ^6.1.5
  dio: ^5.10.0
  cached_network_image: ^3.4.1
  flutter_secure_storage: ^9.2.2
  maplibre_gl: ^0.26.2
  url_launcher: ^6.3.2
  shimmer: ^3.0.0
  geolocator: ^13.0.4
  http: ^1.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/services/
    - assets/images/icons/
    - assets/images/banners/
    - assets/images/cars/
    - assets/map/
